<div class="inventory-form-container">
  <mat-toolbar color="primary">
    <span>{{ isEditMode ? 'Edit Inventory Item' : 'Create Inventory Item' }}</span>
    <span class="spacer"></span>
    <button mat-button color="warn" (click)="onCancel()">
      <mat-icon>close</mat-icon>
      Cancel
    </button>
  </mat-toolbar>

  <mat-card class="form-card">
    <mat-card-content>
      <form [formGroup]="inventoryForm" (ngSubmit)="onSubmit()">
        <mat-form-field appearance="fill" class="full-width">
          <mat-label>Product Name</mat-label>
          <input matInput formControlName="productName" placeholder="Enter product name">
          <mat-error *ngIf="inventoryForm.get('productName')?.hasError('required')">
            Product name is required
          </mat-error>
        </mat-form-field>

        <mat-form-field appearance="fill">
          <mat-label>Quantity</mat-label>
          <input matInput type="number" formControlName="quantity" placeholder="Enter quantity">
          <mat-error *ngIf="inventoryForm.get('quantity')?.hasError('required')">
            Quantity is required
          </mat-error>
          <mat-error *ngIf="inventoryForm.get('quantity')?.hasError('min')">
            Quantity must be at least 0
          </mat-error>
        </mat-form-field>

        <mat-form-field appearance="fill">
          <mat-label>Minimum Quantity</mat-label>
          <input matInput type="number" formControlName="minQuantity" placeholder="Enter minimum quantity">
          <mat-error *ngIf="inventoryForm.get('minQuantity')?.hasError('required')">
            Minimum quantity is required
          </mat-error>
          <mat-error *ngIf="inventoryForm.get('minQuantity')?.hasError('min')">
            Minimum quantity must be at least 0
          </mat-error>
        </mat-form-field>

        <mat-form-field appearance="fill" class="full-width">
          <mat-label>Location</mat-label>
          <input matInput formControlName="location" placeholder="Enter location">
          <mat-error *ngIf="inventoryForm.get('location')?.hasError('required')">
            Location is required
          </mat-error>
        </mat-form-field>

        <!-- Add additional form fields as needed -->

        <div class="form-actions">
          <button mat-button type="button" color="warn" (click)="onCancel()">
            Cancel
          </button>
          <button mat-flat-button type="submit" color="primary" [disabled]="inventoryForm.invalid">
            {{ isEditMode ? 'Update' : 'Create' }}
          </button>
        </div>
      </form>
    </mat-card-content>
  </mat-card>
</div>
