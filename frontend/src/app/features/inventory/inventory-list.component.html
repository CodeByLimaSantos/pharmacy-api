<div class="inventory-container">
  <header class="inventory-header">
    <h1>Inventory Management</h1>
    <div class="header-actions">
      <button mat-button color="primary" routerLink="/inventory/create">
        <mat-icon>add</mat-icon>
        New Inventory Item
      </button>
    </div>
  </header>

  <mat-table [dataSource]="inventoryItems" class="mat-elevation-z8">
    <!-- Product Name Column -->
    <ng-container matColumnDef="productName">
      <mat-header-cell *matHeaderCellDef> Product Name </mat-header-cell>
      <mat-cell *matCellDef="let item"> {{item.productName}} </mat-cell>
    </ng-container>

    <!-- Quantity Column -->
    <ng-container matColumnDef="quantity">
      <mat-header-cell *matHeaderCellDef> Quantity </mat-header-cell>
      <mat-cell *matCellDef="let item"> {{item.quantity}} </mat-cell>
    </ng-container>

    <!-- Min Quantity Column -->
    <ng-container matColumnDef="minQuantity">
      <mat-header-cell *matHeaderCellDef> Min Quantity </mat-header-cell>
      <mat-cell *matCellDef="let item"> {{item.minQuantity}} </mat-cell>
    </ng-container>

    <!-- Location Column -->
    <ng-container matColumnDef="location">
      <mat-header-cell *matHeaderCellDef> Location </mat-header-cell>
      <mat-cell *matCellDef="let item"> {{item.location}} </mat-cell>
    </ng-container>

    <!-- Actions Column -->
    <ng-container matColumnDef="actions">
      <mat-header-cell *matHeaderCellDef> Actions </mat-header-cell>
      <mat-cell *matCellDef="let item">
        <button mat-button color="warn" (click)="deleteItem(item.id)">
          <mat-icon>delete</mat-icon>
        </button>
        <a mat-button color="primary" [routerLink]="['/inventory/edit', item.id]">
          <mat-icon>edit</mat-icon>
        </a>
      </mat-cell>
    </ng-container>

    <mat-header-row *matHeaderRowDef="displayedColumns"></mat-header-row>
    <mat-row *matRowDef="let row; columns: displayedColumns;"></mat-row>
  </mat-table>

  <!-- Empty state -->
  <div *ngIf="inventoryItems.length === 0" class="empty-state">
    <mat-icon>inventory_2</mat-icon>
    <p>No inventory items found.</p>
    <button mat-button color="primary" routerLink="/inventory/create">
      Add First Item
    </button>
  </div>
</div>
